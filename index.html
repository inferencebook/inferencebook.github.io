<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Inference Book</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #e6eef2; /* light blue background */
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      font-weight: 600;
      font-size: 3em;
      color: #2f4f5f;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: 300;
      font-size: 1.5em;
      color: #2f4f5f;
      margin-bottom: 30px;
    }

    p {
      font-size: 1.1em;
      color: #2f4f5f;
    }

    .cover {
      width: 320px;
      max-width: 80%;
      margin: 30px auto;
      display: block;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

  </style>
</head>

<body>
  <div class="container">
    
    <h1>Inference</h1>
    <h2>in Statistical Modelling and Machine Learning</h2>

    <img src="cover_proof.jpg" alt="Book cover" class="cover">

    <p><strong>A Concise Introduction</strong></p>

</html>
